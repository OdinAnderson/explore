<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Maskable icon: safe zone is the inner 80% (inset ~51px each side).
    Keep all content inside x/y 51–461.
  -->
  <rect width="512" height="512" fill="#000"/>
  <defs>
    <linearGradient id="g" x1="80" y1="80" x2="432" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00d4ff"/>
      <stop offset="28%"  stop-color="#ffe600"/>
      <stop offset="55%"  stop-color="#aa00ff"/>
      <stop offset="76%"  stop-color="#ff0088"/>
      <stop offset="100%" stop-color="#ff4545"/>
    </linearGradient>
  </defs>
  <rect x="80"  y="80"  width="352" height="64"  fill="url(#g)"/><!-- top  -->
  <rect x="80"  y="144" width="64"  height="288" fill="url(#g)"/><!-- left -->
  <rect x="144" y="240" width="224" height="64"  fill="url(#g)"/><!-- mid  -->
  <rect x="144" y="368" width="224" height="64"  fill="url(#g)"/><!-- bot  -->
</svg>
